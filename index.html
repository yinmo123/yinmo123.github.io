<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动居中弹窗示例</title>
    <style>
        /* 页面基础样式 */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }

        /* 弹窗遮罩层 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none; /* 默认隐藏，页面加载后通过JS显示 */
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* 弹窗内容框 */
        .modal-content {
            background-color: white;
            padding: 30px 50px;
            border-radius: 8px;
            font-size: 36px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        /* 弹窗淡入动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- 弹窗容器 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">你是傻逼吗？你还真点啊</div>
    </div>

    <script>
        // 获取弹窗元素
        const overlay = document.getElementById('modalOverlay');

        // 页面加载完成后立即显示弹窗
        window.addEventListener('DOMContentLoaded', function() {
            overlay.style.display = 'flex';
        });

        // 点击遮罩层关闭弹窗
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                overlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
